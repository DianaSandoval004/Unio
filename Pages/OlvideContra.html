<!DOCTYPE html>

<html class="light" lang="es">
  <head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Unio | Olvide mi contraseña</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                  "primary-fixed": "#a292ff",
                  "surface-container-lowest": "#ffffff",
                  "tertiary-fixed-dim": "#f27db0",
                  "tertiary-dim": "#8c2a5b",
                  "primary-dim": "#4e0bec",
                  "on-secondary-fixed-variant": "#603aa2",
                  "secondary-fixed": "#ddc8ff",
                  "on-tertiary-container": "#63033b",
                  "outline": "#767777",
                  "error-container": "#f74b6d",
                  "tertiary-container": "#ff8cbd",
                  "surface": "#f6f6f6",
                  "on-primary-container": "#220076",
                  "primary": "#5a2af7",
                  "surface-dim": "#d3d5d5",
                  "on-primary": "#f6f0ff",
                  "surface-container-high": "#e1e3e3",
                  "on-primary-fixed-variant": "#2b0090",
                  "on-secondary": "#f9efff",
                  "background": "#f6f6f6",
                  "primary-container": "#a292ff",
                  "tertiary": "#9b3667",
                  "error": "#b41340",
                  "on-background": "#2d2f2f",
                  "secondary-container": "#ddc8ff",
                  "on-tertiary-fixed-variant": "#6f1044",
                  "on-error": "#ffefef",
                  "surface-bright": "#f6f6f6",
                  "secondary": "#6b46ae",
                  "surface-container-highest": "#dbdddd",
                  "secondary-fixed-dim": "#d2b8ff",
                  "inverse-surface": "#0c0f0f",
                  "on-surface": "#2d2f2f",

                  "secondary-dim": "#5f39a1",
                  "outline-variant": "#acadad",
                  "on-secondary-container": "#563098",
                  "surface-container": "#e7e8e8",
                  "surface-tint": "#5a2af7",
                  "error-dim": "#a70138",
                  "inverse-on-surface": "#9c9d9d",
                  "tertiary-fixed": "#ff8cbd",
                  "surface-variant": "#dbdddd",
                  "on-error-container": "#510017",
                  "on-tertiary": "#ffeff2",
                  "on-tertiary-fixed": "#37001e",
                  "on-secondary-fixed": "#431783",
                  "on-surface-variant": "#5a5c5c",
                  "inverse-primary": "#927dff",
                  "on-primary-fixed": "#000000"

                fontFamily: {
                  "headline": ["Plus Jakarta Sans"],
                  "body": ["Plus Jakarta Sans"],
                  "label": ["Plus Jakarta Sans"]
                },
                borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
              },
            },

    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
      .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
  </head>

  <body class="bg-background text-on-background min-h-screen flex flex-col">
    <!-- Supresión de navegación global para flujo transaccional de recuperación de contraseña -->
    <main class="flex-grow flex items-center justify-center px-6 py-12">
      <div class="max-w-md w-full">

        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-12">
          <div class="mb-8">
            <img alt="UNIO Logo" class="h-12 w-auto" data-alt="Modern minimalist logo for UNIO brand with fluid kinetic lines and professional typography in violet tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuClbhuU3wdkOYWKKpNOpFq1RaoftuTZlxPYTQtoeMHLkKURrrNlbXbesoPltbg9463oB0ZDGMQvyvRC2Bl2IOcVdIp91LF6hpIEYja2ApaRNyDIzq1AnvNnq2oSykMNCWZMdLgwUGzdaH4xwxWuKaw-pewYcKxfwnn73PebxPglM1IiHdEhYAQfaP4hETxVbilrKnNGmOJo4LdMj9_lWHb3LSfpYrDjnHulDvAyvK31ZTQX5XLFWtLWJ117SWmnGVMk8pM4qGnyLw"/>
          </div>
          <h1 class="text-[2.25rem] font-extrabold tracking-tight text-on-surface text-center leading-tight">
            ¿Olvidaste tu contraseña?
          </h1>
          <p class="mt-4 text-on-surface-variant text-center body-lg leading-relaxed">
            No te preocupes, dinos dónde quieres recibir las instrucciones para restablecerla.
          </p>
        </div>

        <!-- Recovery Method Selection (Asymmetric Layout/Bento Style) -->
        <div class="grid grid-cols-1 gap-4 mb-8">
          <!-- Option: Email -->
          <button class="group relative flex items-center p-5 bg-surface-container-lowest rounded-xl border border-transparent hover:border-primary/20 transition-all duration-300 shadow-[0_8px_32px_rgba(45,47,47,0.04)] active:scale-[0.98] text-left">
            <div class="flex-shrink-0 w-12 h-12 flex items-center justify-center bg-primary/10 text-primary rounded-full group-hover:bg-primary group-hover:text-on-primary transition-colors">
              <span class="material-symbols-outlined" data-icon="mail">
                mail
              </span>
            </div>
            <div class="ml-4">
              <span class="block text-sm font-bold text-on-surface label-md uppercase tracking-wider">
                Correo electrónico
              </span>
              <span class="text-sm text-on-surface-variant">
                Recibe un enlace de recuperación
              </span>
            </div>
            <div class="ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
              <span class="material-symbols-outlined text-primary" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                check_circle
              </span>
            </div>
          </button>

          <!-- Option: Phone -->
          <button class="group relative flex items-center p-5 bg-surface-container-lowest rounded-xl border border-transparent hover:border-primary/20 transition-all duration-300 shadow-[0_8px_32px_rgba(45,47,47,0.04)] active:scale-[0.98] text-left">
            <div class="flex-shrink-0 w-12 h-12 flex items-center justify-center bg-primary/10 text-primary rounded-full group-hover:bg-primary group-hover:text-on-primary transition-colors">
              <span class="material-symbols-outlined" data-icon="smartphone">
                smartphone
              </span>
            </div>
            <div class="ml-4">
              <span class="block text-sm font-bold text-on-surface label-md uppercase tracking-wider">
                Número de teléfono
              </span>
              <span class="text-sm text-on-surface-variant">
                Recibe un código vía SMS
              </span>
            </div>
            <div class="ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
              <span class="material-symbols-outlined text-primary" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                check_circle
              </span>
            </div>
          </button>
        </div>

        <!-- Input Field Section -->
        <div class="space-y-6">
          <div class="relative">
            <label class="block text-xs font-bold text-on-surface-variant label-md uppercase tracking-widest mb-2 ml-1" for="recovery_input">
              Introduce tu dato de contacto
            </label>
            <div class="relative group">
              <input class="w-full px-5 py-4 bg-surface-container-low border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/30 transition-all outline-none" id="recovery_input" placeholder="ejemplo@correo.com o +34..." type="text"/>
              <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
                <span class="material-symbols-outlined" data-icon="alternate_email">
                  alternate_email
                </span>
              </div>
            </div>
          </div>

          <!-- Primary CTA -->
          <button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-[0_12px_24px_-8px_rgba(90,42,247,0.4)] hover:shadow-[0_16px_32px_-8px_rgba(90,42,247,0.5)] active:scale-[0.97] transition-all duration-300">
            Enviar Código
          </button>

          <!-- Support Link -->
          <div class="flex justify-center pt-4">
            <a href="../index.html" class="inline-flex items-center text-sm font-semibold text-primary hover:text-primary-dim transition-colors group" href="#">
              <span class="material-symbols-outlined text-sm mr-2 group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">
                arrow_back
              </span>
              Volver al inicio de sesión
            </a>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer Meta -->
    <footer class="p-8 mt-auto flex flex-col items-center text-on-surface-variant/60 text-xs">
      <div class="flex space-x-6 mb-4">
        <a class="hover:text-primary transition-colors" href="../index.html">
          Términos
        </a>
        <a class="hover:text-primary transition-colors" href="../index.html">
          Privacidad
        </a>
        <a class="hover:text-primary transition-colors" href="../index.html">
          Contacto
        </a>
      </div>
      <p>
        © 2026 UNIO - Conectando con la realidad. Todos los derechos reservados.
      </p>
    </footer>

    <!-- Help FAB (Contextual) -->
    <div class="fixed bottom-8 right-8 z-40">
      <button class="w-14 h-14 bg-surface-container-lowest rounded-full shadow-xl flex items-center justify-center text-on-surface-variant hover:text-primary active:scale-90 transition-all">
        <span class="material-symbols-outlined" data-icon="help_outline">
          help_outline
        </span>
      </button>
    </div>
  </body>
</html>
