<!DOCTYPE html>

<html class="light" lang="es">
  <head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Unio | Crear actividad</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                  "outline": "#767777",
                  "inverse-surface": "#0c0f0f",
                  "primary-fixed-dim": "#9581ff",
                  "on-secondary": "#f9efff",
                  "tertiary-dim": "#8c2a5b",
                  "on-secondary-container": "#563098",
                  "on-error": "#ffefef",
                  "on-secondary-fixed-variant": "#603aa2",
                  "surface-container-lowest": "#ffffff",
                  "on-error-container": "#510017",
                  "background": "#f6f6f6",
                  "surface-tint": "#6236FF",
                  "surface-container-high": "#e1e3e3",
                  "error-dim": "#a70138",
                  "primary-fixed": "#a292ff",
                  "outline-variant": "#acadad",
                  "primary": "#6236FF",
                  "on-background": "#2d2f2f",
                  "secondary-fixed": "#ddc8ff",
                  "surface-container": "#e7e8e8",
                  "on-surface-variant": "#5a5c5c",
                  "on-tertiary": "#ffeff2",
                  "error-container": "#f74b6d",
                  "secondary-dim": "#5f39a1",
                  "surface-bright": "#f6f6f6",
                  "on-surface": "#2d2f2f",
                  "primary-dim": "#4e0bec",
                  "secondary-container": "#ddc8ff",
                  "error": "#b41340",
                  "secondary-fixed-dim": "#d2b8ff",
                  "surface-variant": "#dbdddd",
                  "on-primary-container": "#220076",
                  "on-primary-fixed": "#000000",
                  "on-tertiary-fixed": "#37001e",
                  "on-primary-fixed-variant": "#2b0090",
                  "on-tertiary-container": "#63033b",
                  "secondary": "#6b46ae",
                  "tertiary": "#9b3667",
                  "on-tertiary-fixed-variant": "#6f1044",
                  "surface-container-low": "#f0f1f1",
                  "tertiary-fixed-dim": "#f27db0",
                  "on-primary": "#f6f0ff",
                  "inverse-on-surface": "#9c9d9d",
                  "tertiary-container": "#ff8cbd",
                  "tertiary-fixed": "#ff8cbd",
                  "surface": "#f6f6f6",
                  "on-secondary-fixed": "#431783",
                  "inverse-primary": "#927dff",
                  "surface-container-highest": "#dbdddd",
                  "surface-dim": "#d3d5d5",
                  "primary-container": "#a292ff"
                },
                fontFamily: {
                  "headline": ["Plus Jakarta Sans"],
                  "body": ["Plus Jakarta Sans"],
                  "label": ["Plus Jakarta Sans"]
                },
                borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
              },
            },
          }
    </script>

    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
      .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
  </head>

  <body class="bg-background text-on-surface min-h-screen">
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-outline-variant/10 px-4 md:px-8 py-4">
      <div class="max-w-7xl mx-auto flex items-center">
        <img alt="UNIO Logo" class="h-8 md:h-10 w-auto object-contain" src="../Recursos/logo.png"/>
      </div>
    </nav>
    <!-- Top Navigation Bar -->

    <!-- Main Content Canvas -->
    <main class="pb-32 px-4 md:px-8 max-w-4xl mx-auto pt-12">
      <!-- Header Section -->
      <div class="mb-12 text-center md:text-left flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h1 class="text-[3.5rem] font-extrabold tracking-tight leading-tight text-on-surface mb-2 font-headline">Crear actividad</h1>
          <p class="text-body-lg text-on-surface-variant max-w-xl">
            Diseña una experiencia única para tu comunidad. 
            <br>
            Fecha de publicación: 
            <span class="font-bold">
              24 Mayo, 2024
            </span>
          </p>
        </div>
      </div>

      <!-- Form Shell -->
      <div class="grid grid-cols-1 gap-8">
        <!-- Section: Visual & Status -->
        <section class="bg-surface-container-lowest p-8 rounded-xl shadow space-y-6">
          <!-- Image Upload Placeholder -->
          <div class="md:col-span-2 space-y-4">
            <label class="block font-medium text-sm uppercase tracking-widest text-on-surface-variant font-label">
              Imagen de la actividad
            </label>
            <div class="aspect-video w-full bg-surface-container-low rounded-xl border-2 border-dashed border-outline-variant flex flex-col items-center justify-center cursor-pointer hover:border-primary/40 transition-colors group">
              <span class="material-symbols-outlined text-4xl text-on-surface-variant group-hover:text-primary transition-colors">
                add_photo_alternate
              </span>
              <p class="mt-2 text-sm text-on-surface-variant">
                Sube una imagen para ilustrar tu actividad
              </p>
            </div>
          </div>
        </section>

        <!-- Section 1: Basic Info & Classification -->
        <section class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_8px_32px_rgba(45,47,47,0.04)] space-y-8">
          <div class="space-y-2">
            <label class="block font-medium text-sm uppercase tracking-widest text-on-surface-variant font-label">
              Nombre de la actividad
            </label>
            <input class="w-full h-14 px-5 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body text-lg transition-all" placeholder="Ej: Clase magistral de acuarela moderna" type="text"/>
          </div>
          <div class="space-y-4">
            <label class="block font-medium text-sm uppercase tracking-widest text-on-surface-variant font-label">
              Clasificación
            </label>
            <div class="flex flex-wrap gap-2">
              <button class="px-5 py-2.5 rounded-full bg-primary text-on-primary font-medium text-sm transition-all shadow-sm">
                Creativa y artística
              </button>
              <button class="px-5 py-2.5 rounded-full bg-surface-container-highest text-on-surface-variant font-medium text-sm hover:bg-surface-variant transition-all">
                Bienestar y relajación
              </button>
              <button class="px-5 py-2.5 rounded-full bg-surface-container-highest text-on-surface-variant font-medium text-sm hover:bg-surface-variant transition-all">
                Al aire libre y con la naturaleza
              </button>
              <button class="px-5 py-2.5 rounded-full bg-surface-container-highest text-on-surface-variant font-medium text-sm hover:bg-surface-variant transition-all">
                Turismo y exploración
              </button>
              <button class="px-5 py-2.5 rounded-full bg-surface-container-highest text-on-surface-variant font-medium text-sm hover:bg-surface-variant transition-all">
                Gastronómica
              </button>
              <button class="px-5 py-2.5 rounded-full bg-surface-container-highest text-on-surface-variant font-medium text-sm hover:bg-surface-variant transition-all">
                Social y comunitaria
              </button>
              <button class="px-5 py-2.5 rounded-full bg-surface-container-highest text-on-surface-variant font-medium text-sm hover:bg-surface-variant transition-all">
                Física y deportiva
              </button>
              <button class="px-5 py-2.5 rounded-full bg-surface-container-highest text-on-surface-variant font-medium text-sm hover:bg-surface-variant transition-all">
                Entretenimiento y ocio
              </button>
              <button class="px-5 py-2.5 rounded-full bg-surface-container-highest text-on-surface-variant font-medium text-sm hover:bg-surface-variant transition-all">
                Intelectual y cultural
              </button>
            </div>
          </div>
        </section>

        <!-- Section 2: Limits & Ages -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_8px_32px_rgba(45,47,47,0.04)] space-y-6">
            <label class="block font-medium text-sm uppercase tracking-widest text-on-surface-variant font-label">
              Límites de Participantes
            </label>
            <div class="grid grid-cols-2 gap-4">
              <div class="space-y-2">
                <span class="text-xs text-on-surface-variant font-medium">
                  Mínimo
                </span>
                <input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20" placeholder="1" type="number"/>
              </div>
              <div class="space-y-2">
                <span class="text-xs text-on-surface-variant font-medium">
                  Máximo
                </span>
                <input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20" placeholder="Ilimitado" type="number"/>
              </div>
            </div>
          </div>
          <div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_8px_32px_rgba(45,47,47,0.04)] space-y-6">
            <label class="block font-medium text-sm uppercase tracking-widest text-on-surface-variant font-label">
              Rango de Edad
            </label>
            <div class="grid grid-cols-2 gap-4">
              <div class="space-y-2">
                <span class="text-xs text-on-surface-variant font-medium">
                  Edad mínima
                </span>
                <input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20" placeholder="18" type="number"/>
              </div>
              <div class="space-y-2">
                <span class="text-xs text-on-surface-variant font-medium">
                  Edad máxima
                </span>
                <input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20" placeholder="100" type="number"/>
              </div>
            </div>
          </div>
        </section>

        <!-- Section 3: Time & Location -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_8px_32px_rgba(45,47,47,0.04)] space-y-6">
            <label class="block font-medium text-sm uppercase tracking-widest text-on-surface-variant font-label">
              Horarios
            </label>
            <div class="space-y-4">
              <div class="grid grid-cols-2 gap-2">
                <div class="col-span-2 text-xs font-bold text-primary">
                  INICIO
                </div>
                <input class="h-12 px-4 bg-surface-container-low border-none rounded-lg text-sm" type="date"/>
                <input class="h-12 px-4 bg-surface-container-low border-none rounded-lg text-sm" type="time"/>
              </div>
              <div class="grid grid-cols-2 gap-2">
                <div class="col-span-2 text-xs font-bold text-primary">
                  FIN
                </div>
                <input class="h-12 px-4 bg-surface-container-low border-none rounded-lg text-sm" type="date"/>
                <input class="h-12 px-4 bg-surface-container-low border-none rounded-lg text-sm" type="time"/>
              </div>
            </div>
          </div>
          <div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_8px_32px_rgba(45,47,47,0.04)] space-y-4 flex flex-col">
            <label class="block font-medium text-sm uppercase tracking-widest text-on-surface-variant font-label">
              Ubicación
            </label>
            <div class="flex-grow overflow-hidden rounded-xl bg-surface-container relative group min-h-[120px]">
              <img alt="Mapa" class="w-full h-full object-cover opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgrkINsauK7ABqaEEeZ_UsXdI5NUgCc8t6d-5vZa9rY31zAjpoLWEgrixzwzquI99BsaTqT1OnTChXTFadJaTWJH9sb6DjM6NZ6hzSuzztXTiH-QkuAuJn6jLDx05JheZlSLMsWHY8_u_wU1ChF5bKHz6AJcyGNxtH-Sd35ZHoqFeW4yGQ_cH9OFgTkgTLoVZKqCEp7zW97E3ZPxUPWbQV17hKhk-kSr14CY2gOq0nQp7CQXuaexAldpGKh76hcDgI0svyh1K1Iw"/>
              <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">
                  location_on
                </span>
              </div>
            </div>
            <input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-on-surface text-sm" placeholder="Añadir dirección o enlace" type="text"/>
          </div>
        </section>

        <!-- Section 4: Description & Privacy -->
        <section class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_8px_32px_rgba(45,47,47,0.04)] space-y-8">
          <div class="space-y-2">
            <label class="block font-medium text-sm uppercase tracking-widest text-on-surface-variant font-label">
              Descripción de la actividad
            </label>
            <textarea class="w-full p-5 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface font-body resize-none" placeholder="Describe qué haremos, materiales necesarios, etc." rows="4"></textarea>
          </div>
          <div class="pt-4 mb-8 border-t border-outline-variant/20">
            <label class="block font-medium text-sm uppercase tracking-widest text-on-surface-variant font-label mb-4">
              Gestión de Asistentes
            </label>
            <label class="flex items-center justify-between p-4 rounded-xl bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all">
              <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-primary shadow-sm">
                  <span class="material-symbols-outlined">
                    person_add_check
                  </span>
                </div>
                <div>
                  <p class="font-bold text-on-surface text-sm">
                    Requiere aprobación para asistir
                  </p>
                  <p class="text-[11px] text-on-surface-variant">
                    El organizador debe aceptar las solicitudes de asistencia manualmente
                  </p>
                </div>
              </div>
              <div class="relative">
                <input class="peer sr-only" type="checkbox"/>
                <div class="w-11 h-6 bg-outline-variant/30 rounded-full peer peer-focus:ring-2 peer-focus:ring-primary/20 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary transition-colors"></div>
              </div>
            </label>
          </div>
          <div class="pt-4 border-t border-outline-variant/20">
            <label class="block font-medium text-sm uppercase tracking-widest text-on-surface-variant font-label mb-6">
              Privacidad de la Actividad
            </label>
            <div class="flex flex-col md:flex-row gap-4">
              <label class="flex-1 cursor-pointer group">
                <input checked="" class="hidden peer" name="privacy" type="radio" value="public"/>
                <div class="p-4 rounded-xl border-2 border-transparent bg-surface-container-low peer-checked:border-primary peer-checked:bg-primary/5 transition-all flex items-center gap-4">
                  <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-primary shadow-sm">
                    <span class="material-symbols-outlined">
                      public
                    </span>
                  </div>
                  <div>
                    <p class="font-bold text-on-surface text-sm">
                      Pública
                    </p>
                    <p class="text-[11px] text-on-surface-variant">
                      Visible para toda la comunidad
                    </p>
                  </div>
                </div>
              </label>
              <label class="flex-1 cursor-pointer group">
                <input class="hidden peer" name="privacy" type="radio" value="private"/>
                <div class="p-4 rounded-xl border-2 border-transparent bg-surface-container-low peer-checked:border-primary peer-checked:bg-primary/5 transition-all flex items-center gap-4">
                  <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-on-surface-variant shadow-sm">
                    <span class="material-symbols-outlined">
                      lock
                    </span>
                  </div>
                  <div>
                    <p class="font-bold text-on-surface text-sm">
                      Privada
                    </p>
                    <p class="text-[11px] text-on-surface-variant">
                      Solo visible mediante invitación
                    </p>
                  </div>
                </div>
              </label>
            </div>
          </div>
        </section>

        <!-- CTA Section -->
        <div class="flex flex-col md:flex-row items-center justify-end gap-4 mt-8">
          <button onclick="history.back()" class="w-full md:w-auto px-8 py-4 text-primary font-bold hover:bg-surface-container-low rounded-xl transition-all">
            Cancelar
          </button>
          <a href="../Pages/Mapa.html"
            class="w-full md:w-auto px-10 py-4 bg-gradient-to-br from-primary to-primary-dim text-on-primary font-bold text-lg rounded-xl shadow-[0_8px_24px_rgba(98,54,255,0.3)] hover:scale-[1.02] active:scale-95 transition-all text-center inline-block">
            Publicar actividad
          </a>
        </div>
      </div>
    </main>

  </body>
</html>
